<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พอร์ทัลรับลูกจ้าง</title>

<!-- Leaflet (OpenStreetMap) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Thai font support -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#1A2B4C;
    --navy-soft:#2C4070;
    --amber:#F0A847;
    --amber-dark:#C97F1F;
    --green:#3DA35D;
    --gray:#94A3B8;
    --bg:#F7F8FA;
    --card:#FFFFFF;
    --text:#1E2430;
    --text-soft:#6B7280;
    --radius:14px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Noto Sans Thai',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--navy); color:white; padding:18px 20px;
    display:flex; align-items:center; gap:14px;
  }
  header .logo{
    width:38px;height:38px;border-radius:10px; background:var(--amber);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:var(--navy);font-size:18px;flex-shrink:0;
  }
  header .titles h1{ 
    font-size:16px; margin:0; font-weight:700; letter-spacing:.2px; 
  }
  header .titles p{ 
    margin:2px 0 0; font-size:12.5px; color:#B9C3DA; 
  }
  header .route-pill{
    margin-left:auto; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18);
    padding:6px 12px; border-radius:999px; font-size:12.5px; white-space:nowrap;
  }
  main{
    display:grid; grid-template-columns: 1.3fr 1fr; gap:16px;
    padding:16px; max-width:1280px; margin:0 auto;
  }
  @media (max-width: 880px){ main{ grid-template-columns: 1fr; } }
  .panel{
    background:var(--card); border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(16,24,40,.04), 0 1px 8px rgba(16,24,40,.04);
    overflow:hidden;
  }
  #map{ height:420px; width:100%; }
  .map-wrap .panel-label{
    padding:12px 16px 0; font-size:13px; font-weight:700; color:var(--navy);
    letter-spacing:.3px; text-transform:uppercase;
  }
  .timeline-wrap{ padding:16px; }
  .timeline-wrap .panel-label{
    font-size:13px;font-weight:700;color:var(--navy);
    text-transform:uppercase;letter-spacing:.3px;margin-bottom:14px;
  }
  .rail{ position:relative; padding-left:26px; }
  .rail::before{
    content:""; position:absolute; left:9px; top:6px; bottom:6px;
    width:3px; background:var(--gray); border-radius:3px;
  }
  .stop{ position:relative; padding:0 0 22px 14px; cursor:pointer; }
  .stop:last-child{ padding-bottom:0; }
  .stop::before{
    content:""; position:absolute; left:-26px; top:2px;
    width:18px; height:18px; border-radius:50%;
    background:var(--gray); border:3px solid var(--card);
    box-shadow:0 0 0 2px var(--gray); transition:.15s;
  }
  .stop.passed::before{ background:var(--green); box-shadow:0 0 0 2px var(--green); }
  .stop.active::before{
    background:var(--amber); box-shadow:0 0 0 3px var(--amber);
    width:20px;height:20px;left:-27px;top:0;
  }
  .stop .name{ font-size:13.5px; color:var(--text-soft); margin-top:1px; }
  .stop.active .name{ color:var(--text); font-weight:600; }
  .stop .status-tag{
    display:inline-block; margin-top:5px; font-size:10.5px; font-weight:700;
    letter-spacing:.3px; padding:2px 8px; border-radius:999px;
    background:#EEF1F6; color:var(--text-soft);
  }
  .stop.active .status-tag{ background:#FDF1DF; color:var(--amber-dark); }
  .stop.passed .status-tag{ background:#E6F4EA; color:var(--green); }
  .stop:hover .name{ color:var(--navy); }
  .detail{ grid-column: 1 / -1; padding:18px; }
  .detail-inner{ display:grid; grid-template-columns: 280px 1fr; gap:18px; }
  @media (max-width:640px){ .detail-inner{ grid-template-columns: 1fr; } }
  .detail-photo{ width:100%; height:190px; border-radius:10px; object-fit:cover; background:#E5E8ED; }
  .detail-eyebrow{
    font-size:11.5px; font-weight:700; color:var(--amber-dark);
    text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px;
  }
  .detail-name{ font-size:21px; font-weight:800; color:var(--navy); margin:0 0 10px; }
  .detail-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:12px; }
  .detail-field label{
    display:block; font-size:11px; color:var(--text-soft);
    text-transform:uppercase; letter-spacing:.3px; margin-bottom:3px;
  }
  .detail-field div{ font-size:14.5px; font-weight:600; color:var(--text); }
  .detail-landmark{
    grid-column: 1 / -1; margin-top: 8px;
    padding: 12px; background: #FDF1DF; border-radius: 10px;
    border-left: 4px solid var(--amber);
  }
  .detail-landmark label{ color: var(--amber-dark); font-weight:700; font-size:11px; }
  .detail-landmark div{ color: var(--text); font-size: 13px; line-height: 1.5; margin-top:4px; }
  .detail-actions{ display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .btn{ border:none; cursor:pointer; padding:10px 16px; border-radius:10px; font-size:13.5px; font-weight:700; display:inline-flex; align-items:center; gap:6px; }
  .btn-primary{ background:var(--navy); color:white; text-decoration:none; }
  .btn-primary:hover{ background:var(--navy-soft); }
  footer{ text-align:center; padding:18px; font-size:12px; color:var(--text-soft); }
  .marker-pin{
    background:var(--gray); color:white; font-weight:700; font-size:11px;
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:3px solid white; box-shadow:0 1px 4px rgba(0,0,0,.3);
  }
  .marker-pin.active{ background:var(--amber); color:var(--navy); width:32px;height:32px;font-size:12.5px; }
  .marker-pin.passed{ background:var(--green); }
  .leaflet-popup-content{ font-family:inherit; font-size:13px; min-width:160px; }
  .leaflet-popup-content b{ color:var(--navy); }
  .load-state{ padding:40px 16px; text-align:center; color:var(--text-soft); font-size:14px; }
  .load-state.error{ color:#B42318; }
</style>
</head>
<body>

<header>
  <div class="logo">🚐</div>
  <div class="titles">
    <h1 id="headerTitle">กำลังโหลด...</h1>
  </div>
  <div class="route-pill" id="nextStopPill">กำลังโหลด…</div>
</header>

<main>
  <div class="panel map-wrap">
    <div class="panel-label">แผนที่เส้นทาง</div>
    <div id="map"></div>
  </div>

  <div class="panel timeline-wrap">
    <div class="panel-label">ตารางรับ</div>
    <div class="rail" id="rail"><div class="load-state">กำลังโหลดข้อมูลเส้นทาง…</div></div>
  </div>

  <div class="panel detail" id="detailCard"></div>
</main>

<footer>
  แตะจุดรับบนแผนที่หรือในตารางเพื่อดูรายละเอียด · โปรดเตรียมตัวล่วงหน้า
</footer>

<script>
function parseCSV(text){
  const rows = [];
  const lines = text.trim().split(/\r?\n/);
  
  if (lines.length < 2) throw new Error('CSV ต้องมีส่วนหัวอย่างน้อย 1 แถว');
  
  const headers = splitCSVLine(lines[0]);
  
  for (let i = 1; i < lines.length; i++){
    if (!lines[i].trim()) continue;
    const cells = splitCSVLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => {
      const headerKey = h.trim();
      row[headerKey] = (cells[idx] || '').trim();
    });
    rows.push(row);
  }
  return rows;
}

function splitCSVLine(line){
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++){
    const c = line[i];
    if (c === '"'){ inQuotes = !inQuotes; continue; }
    if (c === ',' && !inQuotes){ result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

function rowToStop(row){
  const getName = () => row['ชื่อจุดรับ'] || row['name'] || 'ไม่มีชื่อ';
  const getTime = () => row['เวลา'] || row['time'] || '00:00';
  const getLat = () => Number(row['lat'] || row['ละติจูด'] || 0);
  const getLon = () => Number(row['lon'] || row['ลองจิจูด'] || 0);
  const getImage = () => row['ภาพ'] || row['image'] || 'https://via.placeholder.com/600x400';
  const getLandmark = () => row['แนวทาง'] || row['landmark'] || 'ไม่มีข้อมูล';
  
  const getGMaps = () => {
    const lat = getLat();
    const lon = getLon();
    
    if (lat && lon) {
      return `https://www.google.com/maps?q=${lat},${lon}`;
    }
    
    return `https://www.google.com/maps`;
  };
  
  return {
    seq: Number(row['seq'] || 0),
    ชื่อจุดรับ: getName(),
    เวลา: getTime(),
    lat: getLat(),
    lon: getLon(),
    ภาพ: getImage(),
    แนวทาง: getLandmark(),
    googlemap: getGMaps()
  };
}

let ROUTE = { stops: [], endPoint: '' };
let map, polyline, markers = [];
let selectedSeq = null;

function timeToMinutes(t){
  const [h,m] = t.split(":").map(Number);
  return (h || 0)*60 + (m || 0);
}

function getStopStatus(stop){
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const stopMin = timeToMinutes(stop.เวลา);
  const effectiveNow = (nowMin >= 300 && nowMin <= 480) ? nowMin : timeToMinutes("05:45");
  return stopMin < effectiveNow ? "passed" : "future";
}

function updateHeader(){
  if (ROUTE.stops.length === 0) return;
  
  const firstStop = ROUTE.stops[0];
  
  const extractThaiName = (fullName) => {
    const parts = fullName.split('/');
    return parts[0].trim();
  };
  
  const startName = extractThaiName(firstStop.ชื่อจุดรับ);
  
  // REMOVED: No subtitle, only title
  document.getElementById('headerTitle').textContent = startName;
  document.title = `${startName} - พอร์ทัลรับลูกจ้าง`;
}

function initMap(){
  map = L.map('map', { zoomControl: true, attributionControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const latlngs = ROUTE.stops.map(s => [s.lat, s.lon]);
  polyline = L.polyline(latlngs, { color:'#1A2B4C', weight:4, opacity:.55, dashArray:'1,8' }).addTo(map);
  map.fitBounds(latlngs, { padding:[40,40] });

  ROUTE.stops.forEach(stop => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="marker-pin" id="pin-${stop.seq}">${stop.seq}</div>`,
      iconSize:[26,26],
      iconAnchor:[13,13]
    });
    const marker = L.marker([stop.lat, stop.lon], { icon }).addTo(map);
    // REMOVED: Time from tooltip - only location name
    marker.bindPopup(`<b>${stop.ชื่อจุดรับ}</b>`);
    marker.on('click', () => selectStop(stop.seq));
    markers.push({ seq: stop.seq, marker });
  });
}

function renderTimeline(){
  const rail = document.getElementById('rail');
  rail.innerHTML = '';
  ROUTE.stops.forEach(stop => {
    const status = getStopStatus(stop);
    const isActive = stop.seq === selectedSeq;
    const el = document.createElement('div');
    el.className = `stop ${status} ${isActive ? 'active' : ''}`;
    el.dataset.seq = stop.seq;
    
    let statusHTML = '';
    if (isActive) {
      statusHTML = '<span class="status-tag">เลือก</span>';
    } else if (status === 'passed') {
      statusHTML = '<span class="status-tag">ผ่านแล้ว</span>';
    }
    
    // REMOVED: Time display - only location name
    el.innerHTML = `
      <div class="name">${stop.ชื่อจุดรับ}</div>
      ${statusHTML}
    `;
    el.addEventListener('click', () => selectStop(stop.seq));
    rail.appendChild(el);
  });
}

function renderDetail(stop){
  const card = document.getElementById('detailCard');
  
  const mapsUrl = stop.googlemap;
  
  card.innerHTML = `
    <div class="detail-inner">
      <img class="detail-photo" src="${stop.ภาพ}" alt="${stop.ชื่อจุดรับ}" onerror="this.src='https://via.placeholder.com/300x200?text=ไม่สามารถโหลดรูป'">
      <div>
        <div class="detail-eyebrow">จุดรับ ${stop.seq} จาก ${ROUTE.stops.length}</div>
        <h2 class="detail-name">${stop.ชื่อจุดรับ}</h2>
        <div class="detail-grid">
          <div class="detail-field">
            <label>สถานที่</label>
            <div>ลำดับที่ ${stop.seq}</div>
          </div>
          <div class="detail-landmark">
            <label>📍 จุดสังเกต</label>
            <div>${stop.แนวทาง}</div>
          </div>
        </div>
        <div class="detail-actions">
          <a class="btn btn-primary" href="${mapsUrl}" target="_blank" rel="noopener">📍 เปิดใน Google Maps</a>
        </div>
      </div>
    </div>
  `;
}

function updateMarkerStyles(){
  ROUTE.stops.forEach(stop => {
    const pin = document.getElementById(`pin-${stop.seq}`);
    if (!pin) return;
    pin.classList.remove('active','passed');
    const status = getStopStatus(stop);
    if (stop.seq === selectedSeq) pin.classList.add('active');
    else if (status === 'passed') pin.classList.add('passed');
  });
}

function updateNextStopPill(){
  const next = ROUTE.stops.find(s => getStopStatus(s) === 'future') || ROUTE.stops[ROUTE.stops.length-1];
  // REMOVED: Time display - only location name
  document.getElementById('nextStopPill').textContent = `ต่อไป: ${next.ชื่อจุดรับ}`;
}

function selectStop(seq){
  selectedSeq = seq;
  const stop = ROUTE.stops.find(s => s.seq === seq);
  if (!stop) return;
  renderTimeline();
  renderDetail(stop);
  updateMarkerStyles();
  const m = markers.find(m => m.seq === seq);
  if (m){ map.panTo(m.marker.getLatLng()); m.marker.openPopup(); }
}

function init(){
  if (!CSV_FILE || CSV_FILE.trim() === '') {
    document.getElementById('rail').innerHTML =
      `<div class="load-state error">ไม่มีการตั้งค่า CSV_FILE</div>`;
    return;
  }
  
  fetch(CSV_FILE)
    .then(res => {
      if (!res.ok) throw new Error(`ไม่สามารถโหลด ${CSV_FILE} (HTTP ${res.status})`);
      return res.text();
    })
    .then(text => {
      if (!text || text.trim() === '') {
        throw new Error('ไฟล์ CSV ว่าง');
      }
      
      const rows = parseCSV(text);
      if (rows.length === 0) {
        throw new Error('CSV ไม่มีแถวข้อมูล');
      }
      
      ROUTE.stops = rows.map(rowToStop).sort((a,b) => a.seq - b.seq);
      
      ROUTE.stops.forEach((stop, idx) => {
        if (!stop.seq || isNaN(stop.lat) || isNaN(stop.lon)) {
          throw new Error(`แถว ${idx + 2}: ข้อมูลไม่ถูกต้อง`);
        }
      });
      
      selectedSeq = ROUTE.stops[0].seq;
      
      updateHeader();
      initMap();
      renderTimeline();
      renderDetail(ROUTE.stops[0]);
      updateMarkerStyles();
      updateNextStopPill();
    })
    .catch(err => {
      const railDiv = document.getElementById('rail');
      if (railDiv) {
        railDiv.innerHTML =
          `<div class="load-state error">❌ ข้อผิดพลาด<br>${err.message}</div>`;
      }
      console.error('Error:', err);
    });
}

const CSV_FILE = "route-tanam-prapradaeng-thai.csv";

window.addEventListener('load', init);
</script>

</body>
</html>
